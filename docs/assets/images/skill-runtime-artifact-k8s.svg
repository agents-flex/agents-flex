<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Skill Artifact Store 在 Kubernetes 多节点分发能力包</title>
  <desc>Skill Artifact 上传到对象存储后，由 Kubernetes 各节点自动下载、校验、缓存和解压，确保每个 Pod 使用相同版本的 Skill。</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" stroke="#252B26"/></pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity=".3"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1 1L10 6L1 11" fill="none" stroke="#3BE6D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>.sans{font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif}.mono{font-family:"JetBrains Mono","SFMono-Regular","Menlo",monospace}</style>
  </defs>
  <rect width="1400" height="788" fill="#111410"/><rect width="1400" height="788" fill="url(#grid)" opacity=".7"/>
  <rect x="30" y="30" width="1340" height="728" rx="8" stroke="#343B35" stroke-width="2"/>
  <g class="sans">
    <text x="70" y="96" class="mono" font-size="15" font-weight="800" fill="#F3C65A">DISTRIBUTED SKILL DELIVERY</text>
    <text x="70" y="148" font-size="38" font-weight="800" fill="#F4F7EE">无论请求落到哪个节点，拿到的都是同一份 Skill</text>
    <text x="70" y="184" font-size="18" fill="#929C94">对象存储解决来源，摘要校验保证内容，节点缓存兼顾效率。</text>
  </g>

  <g filter="url(#shadow)" class="sans">
    <rect x="70" y="270" width="290" height="330" rx="8" fill="#171B18" stroke="#445048" stroke-width="2"/>
    <rect x="96" y="296" width="132" height="30" rx="4" fill="#2F3021"/><text x="112" y="317" class="mono" font-size="13" font-weight="800" fill="#F3C65A">ARTIFACT STORE</text>
    <path d="M139 369C130 369 124 363 124 355C124 347 130 341 138 341C142 331 152 326 163 329C170 331 176 337 178 345C188 345 194 351 194 359C194 365 188 369 181 369H139Z" fill="none" stroke="#F3C65A" stroke-width="4"/>
    <text x="96" y="413" font-size="23" font-weight="750" fill="#F4F7EE">对象存储</text>
    <text x="96" y="445" class="mono" font-size="14" fill="#8F9A91">OSS · COS · OBS · TOS</text>
    <g transform="translate(96 478)"><rect width="238" height="66" rx="6" fill="#202622" stroke="#3D463F"/><path d="M17 16H35L41 22H55V48H17Z" fill="none" stroke="#3BE6D0" stroke-width="2"/><text x="70" y="28" class="mono" font-size="13" font-weight="800" fill="#F4F7EE">weekly-report</text><text x="70" y="48" class="mono" font-size="12" fill="#8F9A91">v1.4.2 · ZIP</text></g>
    <text x="96" y="576" class="mono" font-size="12" font-weight="700" fill="#F3C65A">ONE SOURCE OF TRUTH</text>
  </g>

  <path d="M360 430H496" stroke="#3BE6D0" stroke-width="3" stroke-dasharray="7 8" marker-end="url(#arrow)"/>
  <g class="sans"><rect x="391" y="386" width="132" height="30" rx="4" fill="#233831"/><text x="457" y="407" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#3BE6D0">AUTO DOWNLOAD</text></g>

  <g filter="url(#shadow)" class="sans">
    <rect x="512" y="236" width="818" height="400" rx="8" fill="#171B18" stroke="#3A433C" stroke-width="2"/>
    <text x="540" y="278" class="mono" font-size="13" font-weight="800" fill="#7C867D">KUBERNETES CLUSTER</text>
    <g transform="translate(540 306)">
      <rect width="224" height="252" rx="8" fill="#202622" stroke="#445048"/>
      <rect x="20" y="20" width="86" height="28" rx="4" fill="#233831"/><text x="63" y="39" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#3BE6D0">POD / 01</text>
      <path d="M47 79H177V128H47ZM47 140H177V189H47" fill="#171B18" stroke="#59635B" stroke-width="2"/>
      <circle cx="66" cy="103" r="7" fill="#3BE6D0"/><circle cx="66" cy="164" r="7" fill="#3BE6D0"/>
      <text x="83" y="108" class="mono" font-size="12" font-weight="700" fill="#D9DFD8">SHA-256 OK</text><text x="83" y="169" class="mono" font-size="12" font-weight="700" fill="#D9DFD8">CACHE HIT</text>
      <text x="112" y="224" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#3BE6D0">v1.4.2</text>
    </g>
    <g transform="translate(786 306)">
      <rect width="224" height="252" rx="8" fill="#202622" stroke="#445048"/>
      <rect x="20" y="20" width="86" height="28" rx="4" fill="#233831"/><text x="63" y="39" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#3BE6D0">POD / 02</text>
      <path d="M47 79H177V128H47ZM47 140H177V189H47" fill="#171B18" stroke="#59635B" stroke-width="2"/>
      <circle cx="66" cy="103" r="7" fill="#3BE6D0"/><circle cx="66" cy="164" r="7" fill="#3BE6D0"/>
      <text x="83" y="108" class="mono" font-size="12" font-weight="700" fill="#D9DFD8">SHA-256 OK</text><text x="83" y="169" class="mono" font-size="12" font-weight="700" fill="#D9DFD8">UNPACKED</text>
      <text x="112" y="224" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#3BE6D0">v1.4.2</text>
    </g>
    <g transform="translate(1032 306)">
      <rect width="270" height="252" rx="8" fill="#202622" stroke="#E5FF5A"/>
      <rect x="20" y="20" width="86" height="28" rx="4" fill="#E5FF5A"/><text x="63" y="39" text-anchor="middle" class="mono" font-size="12" font-weight="900" fill="#111410">POD / N</text>
      <path d="M54 79H216V189H54Z" fill="#171B18" stroke="#59635B" stroke-width="2"/>
      <path d="M89 110L109 130L143 96" stroke="#E5FF5A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="135" y="155" text-anchor="middle" class="mono" font-size="13" font-weight="800" fill="#F4F7EE">READY TO RUN</text>
      <text x="135" y="224" text-anchor="middle" class="mono" font-size="12" font-weight="900" fill="#E5FF5A">SAME v1.4.2</text>
    </g>
    <g transform="translate(540 584)">
      <circle cx="8" cy="8" r="8" fill="#3BE6D0"/><path d="M4 8L7 11L12 5" stroke="#111410" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="26" y="13" class="mono" font-size="13" font-weight="700" fill="#D9DFD8">自动校验 · 安全解压 · 节点缓存 · 并发锁</text>
      <text x="762" y="13" text-anchor="end" class="mono" font-size="13" font-weight="800" fill="#E5FF5A">CONSISTENT ON EVERY NODE</text>
    </g>
  </g>

  <g class="sans">
    <text x="70" y="698" font-size="18" font-weight="750" fill="#F4F7EE">从本地目录走向 Kubernetes 集群，Skill 第一次拥有了企业级发布能力。</text>
    <text x="1330" y="698" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#69736B">AGENTS-FLEX</text>
  </g>
</svg>
