<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Skill Runtime 开发与生产安全切换</title>
  <desc>相同的 Skill 和业务代码可以在本地 Runtime、OpenSandbox 和 AIO Sandbox 间切换，生产脚本始终运行在隔离边界内。</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" stroke="#252B26"/></pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity=".3"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1 1L10 6L1 11" fill="none" stroke="#3BE6D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>.sans{font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif}.mono{font-family:"JetBrains Mono","SFMono-Regular","Menlo",monospace}</style>
  </defs>
  <rect width="1400" height="788" fill="#111410"/><rect width="1400" height="788" fill="url(#grid)" opacity=".7"/>
  <rect x="30" y="30" width="1340" height="728" rx="8" stroke="#343B35" stroke-width="2"/>
  <g class="sans">
    <text x="70" y="96" class="mono" font-size="15" font-weight="800" fill="#E5FF5A">ONE SKILL · THREE RUNTIMES</text>
    <text x="70" y="148" font-size="38" font-weight="800" fill="#F4F7EE">开发体验和生产安全，不必二选一</text>
    <text x="70" y="184" font-size="18" fill="#929C94">业务代码和 Skill 保持不变，只切换执行环境。</text>
  </g>

  <g filter="url(#shadow)" class="sans">
    <rect x="70" y="256" width="314" height="360" rx="8" fill="#171B18" stroke="#445048" stroke-width="2"/>
    <rect x="96" y="282" width="94" height="30" rx="4" fill="#233831"/><text x="112" y="303" class="mono" font-size="13" font-weight="800" fill="#3BE6D0">SAME SKILL</text>
    <text x="96" y="358" font-size="26" font-weight="750" fill="#F4F7EE">团队能力包</text>
    <g class="mono" font-size="14" font-weight="700">
      <g transform="translate(96 393)"><rect width="260" height="44" rx="5" fill="#202622" stroke="#3D463F"/><path d="M17 15H25L29 18H41V31H17Z" fill="none" stroke="#3BE6D0" stroke-width="2"/><text x="54" y="27" fill="#D9DFD8">templates/</text></g>
      <g transform="translate(96 449)"><rect width="260" height="44" rx="5" fill="#202622" stroke="#3D463F"/><path d="M17 18L24 22L17 26M29 27H39" stroke="#E5FF5A" stroke-width="2" stroke-linecap="round"/><text x="54" y="27" fill="#D9DFD8">scripts/</text></g>
      <g transform="translate(96 505)"><rect width="260" height="44" rx="5" fill="#202622" stroke="#3D463F"/><path d="M17 14H39V31H17ZM21 18H35M21 23H35" stroke="#FF806D" stroke-width="2"/><text x="54" y="27" fill="#D9DFD8">rules + checks</text></g>
    </g>
    <text x="96" y="584" class="mono" font-size="13" font-weight="700" fill="#7C867D">NO REWRITE REQUIRED</text>
  </g>

  <path d="M384 436H466" stroke="#3BE6D0" stroke-width="3" stroke-dasharray="7 8" marker-end="url(#arrow)"/>
  <g class="sans"><rect x="400" y="392" width="90" height="30" rx="4" fill="#E5FF5A"/><text x="445" y="413" text-anchor="middle" class="mono" font-size="12" font-weight="900" fill="#111410">SWITCH</text></g>

  <g filter="url(#shadow)" class="sans">
    <rect x="494" y="236" width="836" height="400" rx="8" fill="#171B18" stroke="#3A433C" stroke-width="2"/>
    <text x="522" y="278" class="mono" font-size="13" font-weight="800" fill="#7C867D">SKILL RUNTIME</text>
    <g transform="translate(522 306)">
      <rect width="240" height="264" rx="8" fill="#202622" stroke="#445048"/>
      <rect x="20" y="20" width="68" height="28" rx="4" fill="#2A3230"/><text x="54" y="39" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#B8C0B9">DEV</text>
      <circle cx="120" cy="100" r="36" fill="#3BE6D0"/><path d="M99 103L112 116L139 85" stroke="#111410" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="120" y="166" text-anchor="middle" font-size="20" font-weight="750" fill="#F4F7EE">Local Runtime</text>
      <text x="120" y="196" text-anchor="middle" font-size="14" fill="#8F9A91">本机直接执行</text>
      <text x="120" y="230" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#3BE6D0">FAST DEBUG</text>
    </g>
    <g transform="translate(778 306)">
      <rect width="240" height="264" rx="8" fill="#202622" stroke="#E5FF5A"/>
      <rect x="20" y="20" width="92" height="28" rx="4" fill="#E5FF5A"/><text x="66" y="39" text-anchor="middle" class="mono" font-size="12" font-weight="900" fill="#111410">PRODUCTION</text>
      <path d="M120 65L158 78V104C158 128 142 145 120 154C98 145 82 128 82 104V78L120 65Z" fill="#E5FF5A"/><path d="M102 108L115 121L140 92" stroke="#111410" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="120" y="178" text-anchor="middle" font-size="20" font-weight="750" fill="#F4F7EE">OpenSandbox</text>
      <text x="120" y="208" text-anchor="middle" font-size="14" fill="#8F9A91">一任务一沙箱</text>
      <text x="120" y="238" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#E5FF5A">CREATE → RUN → DESTROY</text>
    </g>
    <g transform="translate(1034 306)">
      <rect width="268" height="264" rx="8" fill="#202622" stroke="#FF806D"/>
      <rect x="20" y="20" width="92" height="28" rx="4" fill="#3A2823"/><text x="66" y="39" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#FF806D">ENTERPRISE</text>
      <rect x="91" y="66" width="86" height="72" rx="6" fill="#FF806D"/>
      <path d="M106 83H162V121H106ZM115 93H153M115 102H153M115 111H143" stroke="#111410" stroke-width="3" stroke-linecap="round"/>
      <text x="134" y="178" text-anchor="middle" font-size="20" font-weight="750" fill="#F4F7EE">AIO Sandbox</text>
      <text x="134" y="208" text-anchor="middle" font-size="14" fill="#8F9A91">接入常驻沙箱服务</text>
      <text x="134" y="238" text-anchor="middle" class="mono" font-size="12" font-weight="800" fill="#FF806D">CONNECT EXISTING</text>
    </g>
    <path d="M522 594H1302" stroke="#343B35"/>
    <circle cx="540" cy="612" r="7" fill="#3BE6D0"/><text x="558" y="617" class="mono" font-size="13" font-weight="700" fill="#D9DFD8">Shell · Read · Write · Edit · Glob · Grep</text>
    <text x="1302" y="617" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#E5FF5A">SAME TOOL CONTRACT</text>
  </g>

  <g class="sans">
    <rect x="70" y="674" width="1260" height="44" rx="6" fill="#233831" stroke="#3BE6D0"/>
    <path d="M94 685L107 690V699C107 707 102 712 94 715C86 712 81 707 81 699V690L94 685Z" fill="#3BE6D0"/><path d="M88 700L92 704L100 696" stroke="#111410" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="122" y="702" font-size="16" font-weight="700" fill="#F4F7EE">脚本不继承 Java 服务权限，用户文件和第三方 Skill 始终在可控边界内执行。</text>
    <text x="1306" y="702" text-anchor="end" class="mono" font-size="13" font-weight="800" fill="#3BE6D0">ISOLATED</text>
  </g>
</svg>
