    <text x="76" y="174" font-size="52" font-weight="800" fill="#F4F7EE">Java Agent 最后一块拼图</text>
    <text x="76" y="216" font-size="21" font-weight="500" fill="#A7B0A8">Framework 负责思考，Runtime 负责执行，Agent 最终交付成品。</text>
  </g>

