<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Agents-Flex Skill Runtime：Java Agent 最后一块拼图</title>
  <desc>Agent Framework 将思考能力交给 Skill Runtime，Runtime 在安全沙箱中调用 Shell、Python、文件和团队 Skill，最终交付 PPT、报表和下载链接。</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#252B26" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="runtimeGlow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#E5FF5A" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#3BE6D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowLight" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#F4F7EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .sans { font-family: "Inter", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", "Menlo", "Consolas", monospace; }
      .label { font-family: "JetBrains Mono", "SFMono-Regular", "Menlo", monospace; font-size: 15px; font-weight: 700; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#111410"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.72"/>
  <rect x="32" y="32" width="1536" height="836" rx="8" stroke="#343B35" stroke-width="2"/>

  <!-- Header -->
  <g class="sans">
    <g transform="translate(76 76)">
