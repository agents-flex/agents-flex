      <path d="M10 13L23 0L36 13L23 26Z" fill="#3BE6D0"/>
      <text x="52" y="21" font-size="20" font-weight="750" fill="#F4F7EE">AGENTS-FLEX</text>
      <text x="214" y="21" class="mono" font-size="14" font-weight="700" fill="#7C867D">/ SKILL RUNTIME</text>
